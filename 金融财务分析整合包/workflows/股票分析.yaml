# 股票财务分析完整工作流

workflow: 上市公司股票分析
version: 1.0
description: 从数据获取到报告生成的完整股票分析流程

步骤1_数据收集:
  描述: 获取股票全方位数据
  技能: finance-data-retrieval
  并行任务:
    - 任务: 基本信息
      api: stock_basic
      params: {ts_code: "{{stock_code}}"}
    - 任务: 日线行情
      api: daily
      params: {ts_code: "{{stock_code}}", start_date: "{{start_date}}", end_date: "{{end_date}}"}
    - 任务: 利润表
      api: income
      params: {ts_code: "{{stock_code}}", period: "{{latest_period}}"}
    - 任务: 资产负债表
      api: balancesheet
      params: {ts_code: "{{stock_code}}", period: "{{latest_period}}"}
    - 任务: 现金流量表
      api: cashflow
      params: {ts_code: "{{stock_code}}", period: "{{latest_period}}"}
    - 任务: 财务指标
      api: fina_indicator
      params: {ts_code: "{{stock_code}}"}

步骤2_数据分析:
  描述: 财务指标计算与分析
  技能: finance
  串行任务:
    - 计算ROE、ROA、毛利率
    - 计算负债率、流动比率
    - 营收增长率分析
    - 现金流分析

步骤3_投资决策 (可选):
  描述: 生成投资建议
  技能: trading-analysis
  条件: 用户需要投资建议时
  流程:
    - Phase1: 多维度数据收集
    - Phase2: Bull vs Bear辩论
    - Phase3: 交易决策
    - Phase4: 风险评估
    - Phase5: 生成报告

步骤4_可视化:
  描述: 生成分析图表
  技能: data
  图表列表:
    - K线图
    - 营收趋势图
    - 利润趋势图
    - ROE趋势图
    - 负债率趋势图
    - 现金流图

步骤5_报告生成:
  描述: 生成分析报告
  技能: document-skills
  输出格式:
    - PDF报告
    - Word文档
    - Excel数据表

变量定义:
  stock_code: 股票代码（如600519.SH）
  start_date: 分析开始日期（如20230101）
  end_date: 分析结束日期（如20241231）
  latest_period: 最新财报期（如20241231）
