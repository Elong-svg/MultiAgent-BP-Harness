# 财务报表生成工作流

workflow: 企业财务报表生成
version: 1.0
description: 从原始数据到标准财务报表的生成流程

步骤1_数据准备:
  描述: 收集财务原始数据
  技能: finance-data-retrieval
  任务:
    - 获取总账数据
    - 获取明细账数据
    - 获取银行对账单
    - 获取科目余额表

步骤2_会计处理:
  描述: 期末会计分录处理
  技能: finance
  任务:
    - 预提费用处理
    - 固定资产折旧
    - 预付账款摊销
    - 工资计提
    - 收入确认

步骤3_对账:
  描述: 账账核对、账实核对
  技能: finance
  任务:
    - 总账vs明细账核对
    - 银行对账
    - 往来款核对
    - 存货盘点核对

步骤4_报表编制:
  描述: 生成三大财务报表
  技能: finance
  输出:
    - 资产负债表
    - 利润表
    - 现金流量表
    - 所有者权益变动表

步骤5_报表分析:
  描述: 财务分析与附注
  技能: finance
  任务:
    - 财务比率分析
    - 趋势分析
    - 同行业对比
    - 编写报表附注

步骤6_报告输出:
  描述: 生成最终报告
  技能: document-skills
  输出:
    - 财务报表PDF
    - 财务分析报告
    - 管理层汇报PPT
