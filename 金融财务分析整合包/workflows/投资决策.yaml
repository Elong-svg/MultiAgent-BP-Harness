# 投资决策分析工作流

workflow: 投资决策多维度分析
version: 1.0
description: 基于多角色辩论的投资决策流程

Phase1_数据收集:
  描述: 四位分析师独立收集数据
  技能: trading-analysis + finance-data-retrieval
  
  市场分析师:
    - 获取历史行情数据
    - 技术分析指标
    - 市场趋势判断
    
  基本面分析师:
    - 财务报表分析
    - 估值计算
    - 行业对标
    
  新闻分析师:
    - 公司公告
    - 行业新闻
    - 政策影响
    
  情绪分析师:
    - 资金流向
    - 龙虎榜数据
    - 市场情绪指标

Phase2_投资辩论:
  描述: Bull vs Bear观点辩论
  技能: trading-analysis
  
  Bull观点:
    - 看涨理由
    - 目标价位
    - 催化剂分析
    
  Bear观点:
    - 看跌理由
    - 风险因素
    - 估值过高论据
    
  研究经理仲裁:
    - 评估双方观点
    - 形成投资计划

Phase3_交易决策:
  描述: 确定买卖策略
  技能: trading-analysis
  
  Trader决策:
    - 入场价位
    - 止损设置
    - 仓位建议
    - 时间周期

Phase4_风险评估:
  描述: 多维度风险评估
  技能: trading-analysis
  
  激进派观点:
    - 高风险高回报
    - 激进策略
    
  保守派观点:
    - 风险控制优先
    - 保守策略
    
  中性派观点:
    - 平衡策略
    
  Risk Manager决策:
    - 最终风险评估
    - 风险等级

Phase5_最终报告:
  描述: 生成投资建议报告
  技能: trading-analysis
  
  输出内容:
    - 投资建议: BUY/SELL/HOLD
    - 目标价位
    - 止损价位
    - 风险等级
    - 论据总结
    - 免责声明
